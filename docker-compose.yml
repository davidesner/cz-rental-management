services:
  pg:
    image: postgres:16-alpine
    container_name: rental-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rental_dev
    ports:
      - "5432:5432"
    volumes:
      - rental-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  rental-pg-data:
